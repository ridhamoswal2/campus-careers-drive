<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background with subtle gradient -->
  <rect width="64" height="64" rx="16" fill="#3548F3"/>
  
  <!-- Modern building/company icon -->
  <g transform="translate(16, 16)">
    <!-- Building structure -->
    <rect x="4" y="8" width="6" height="20" rx="1" fill="white"/>
    <rect x="12" y="12" width="6" height="16" rx="1" fill="white" opacity="0.9"/>
    <rect x="20" y="4" width="6" height="24" rx="1" fill="white"/>
    
    <!-- Windows -->
    <rect x="5.5" y="11" width="3" height="3" rx="0.5" fill="#3548F3"/>
    <rect x="5.5" y="17" width="3" height="3" rx="0.5" fill="#3548F3"/>
    <rect x="13.5" y="15" width="3" height="3" rx="0.5" fill="#3548F3"/>
    <rect x="21.5" y="7" width="3" height="3" rx="0.5" fill="#3548F3"/>
    <rect x="21.5" y="13" width="3" height="3" rx="0.5" fill="#3548F3"/>
    <rect x="21.5" y="19" width="3" height="3" rx="0.5" fill="#3548F3"/>
    
    <!-- Connection/network lines at bottom -->
    <line x1="7" y1="28" x2="23" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="28" x2="15" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
